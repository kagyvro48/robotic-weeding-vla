<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520" font-family="Arial, Helvetica, sans-serif">

  <rect width="1100" height="520" fill="white"/>

  <!-- ═══════════════════════════════════════════
       COLOR SCALE (linear interpolation):
       0%   → rgb(178,  24,  43)  deep red
       25%  → rgb(239, 138,  98)  orange-red
       50%  → rgb(254, 224, 144)  yellow
       75%  → rgb(166, 217, 106)  light green
       100% → rgb( 26, 150,  65)  deep green

       Pre-computed per cell:
       ACT   C1=92  C2=80  C3=56  C4=84
       π0    C1=72  C2=84  C3=8   C4=76
       SmolV C1=40  C2=24  C3=4   C4=88
       XVLA  C1=60  C2=32  C3=40  C4=16
  ═══════════════════════════════════════════ -->

  <!-- ── DIMENSIONS ──
       Left margin (row labels): 130px
       Column width: 170px  × 4 = 680px
       Right margin for colorbar: ~160px
       Total width: 130 + 680 + 160 + 130 = ~1100
       Top margin (col headers): 90px
       Row height: 90px × 4 = 360px
       Bottom: 70px
       Total height: 90 + 360 + 70 = 520
  -->

  <!-- ═══ COLUMN HEADERS ═══ -->
  <!-- C1 -->
  <rect x="130" y="50" width="170" height="40" rx="0" fill="#2255a4"/>
  <text x="215" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="white">C1</text>
  <!-- C2 -->
  <rect x="300" y="50" width="170" height="40" fill="#2255a4"/>
  <text x="385" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="white">C2</text>
  <!-- C3 -->
  <rect x="470" y="50" width="170" height="40" fill="#2255a4"/>
  <text x="555" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="white">C3</text>
  <!-- C4 -->
  <rect x="640" y="50" width="170" height="40" fill="#555"/>
  <text x="725" y="68" text-anchor="middle" font-size="16" font-weight="bold" fill="white">C4 *</text>
  <text x="725" y="84" text-anchor="middle" font-size="11" fill="#ddd">(ambiguous)</text>

  <!-- ═══ ROW LABELS ═══ -->
  <!-- ACT -->
  <text x="120" y="137" text-anchor="end" font-size="16" font-weight="bold" fill="#222">ACT</text>
  <!-- π0 -->
  <text x="120" y="227" text-anchor="end" font-size="16" font-weight="bold" fill="#222">π0</text>
  <!-- SmolVLA -->
  <text x="120" y="317" text-anchor="end" font-size="16" font-weight="bold" fill="#222">SmolVLA</text>
  <!-- XVLA -->
  <text x="120" y="407" text-anchor="end" font-size="16" font-weight="bold" fill="#222">X-VLA</text>

  <!-- ═══════════════════════
       ROW 1: ACT
       C1=92 C2=80 C3=56 C4=84
  ═══════════════════════ -->
  <!-- ACT C1=92%  → deep green -->
  <rect x="130" y="90" width="170" height="90" fill="#1a9641"/>
  <text x="215" y="132" text-anchor="middle" font-size="17" font-weight="bold" fill="white">23/25</text>
  <text x="215" y="153" text-anchor="middle" font-size="15" fill="white">(92 %)</text>

  <!-- ACT C2=80%  → green -->
  <rect x="300" y="90" width="170" height="90" fill="#4dac26"/>
  <text x="385" y="132" text-anchor="middle" font-size="17" font-weight="bold" fill="white">20/25</text>
  <text x="385" y="153" text-anchor="middle" font-size="15" fill="white">(80 %)</text>

  <!-- ACT C3=56%  → yellow-green -->
  <rect x="470" y="90" width="170" height="90" fill="#d9ef8b"/>
  <text x="555" y="132" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">14/25</text>
  <text x="555" y="153" text-anchor="middle" font-size="15" fill="#333">(56 %)</text>

  <!-- ACT C4=84%  → green (muted, grayed border for C4) -->
  <rect x="640" y="90" width="170" height="90" fill="#4dac26" opacity="0.75"/>
  <rect x="640" y="90" width="170" height="90" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="725" y="132" text-anchor="middle" font-size="17" font-weight="bold" fill="white">21/25</text>
  <text x="725" y="153" text-anchor="middle" font-size="15" fill="white">(84 %)</text>

  <!-- ═══════════════════════
       ROW 2: π0
       C1=72 C2=84 C3=8 C4=76
  ═══════════════════════ -->
  <!-- π0 C1=72%  → light green -->
  <rect x="130" y="180" width="170" height="90" fill="#a6d96a"/>
  <text x="215" y="222" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">18/25</text>
  <text x="215" y="243" text-anchor="middle" font-size="15" fill="#333">(72 %)</text>

  <!-- π0 C2=84%  → green -->
  <rect x="300" y="180" width="170" height="90" fill="#4dac26"/>
  <text x="385" y="222" text-anchor="middle" font-size="17" font-weight="bold" fill="white">21/25</text>
  <text x="385" y="243" text-anchor="middle" font-size="15" fill="white">(84 %)</text>

  <!-- π0 C3=8%  → deep red -->
  <rect x="470" y="180" width="170" height="90" fill="#d7191c"/>
  <text x="555" y="222" text-anchor="middle" font-size="17" font-weight="bold" fill="white">2/25</text>
  <text x="555" y="243" text-anchor="middle" font-size="15" fill="white">(8 %)</text>

  <!-- π0 C4=76%  → light green (muted) -->
  <rect x="640" y="180" width="170" height="90" fill="#a6d96a" opacity="0.75"/>
  <rect x="640" y="180" width="170" height="90" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="725" y="222" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">19/25</text>
  <text x="725" y="243" text-anchor="middle" font-size="15" fill="#333">(76 %)</text>

  <!-- ═══════════════════════
       ROW 3: SmolVLA
       C1=40 C2=24 C3=4 C4=88
  ═══════════════════════ -->
  <!-- SmolVLA C1=40%  → yellow -->
  <rect x="130" y="270" width="170" height="90" fill="#fee08b"/>
  <text x="215" y="312" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">10/25</text>
  <text x="215" y="333" text-anchor="middle" font-size="15" fill="#333">(40 %)</text>

  <!-- SmolVLA C2=24%  → orange-red -->
  <rect x="300" y="270" width="170" height="90" fill="#f46d43"/>
  <text x="385" y="312" text-anchor="middle" font-size="17" font-weight="bold" fill="white">6/25</text>
  <text x="385" y="333" text-anchor="middle" font-size="15" fill="white">(24 %)</text>

  <!-- SmolVLA C3=4%  → deep red -->
  <rect x="470" y="270" width="170" height="90" fill="#d7191c"/>
  <text x="555" y="312" text-anchor="middle" font-size="17" font-weight="bold" fill="white">1/25</text>
  <text x="555" y="333" text-anchor="middle" font-size="15" fill="white">(4 %)</text>

  <!-- SmolVLA C4=88%  → deep green (muted) -->
  <rect x="640" y="270" width="170" height="90" fill="#1a9641" opacity="0.75"/>
  <rect x="640" y="270" width="170" height="90" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="725" y="312" text-anchor="middle" font-size="17" font-weight="bold" fill="white">22/25</text>
  <text x="725" y="333" text-anchor="middle" font-size="15" fill="white">(88 %)</text>

  <!-- ═══════════════════════
       ROW 4: XVLA
       C1=60 C2=32 C3=40 C4=16
  ═══════════════════════ -->
  <!-- XVLA C1=60%  → yellow-green -->
  <rect x="130" y="360" width="170" height="90" fill="#d9ef8b"/>
  <text x="215" y="402" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">15/25</text>
  <text x="215" y="423" text-anchor="middle" font-size="15" fill="#333">(60 %)</text>

  <!-- XVLA C2=32%  → orange -->
  <rect x="300" y="360" width="170" height="90" fill="#fdae61"/>
  <text x="385" y="402" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">8/25</text>
  <text x="385" y="423" text-anchor="middle" font-size="15" fill="#333">(32 %)</text>

  <!-- XVLA C3=40%  → yellow -->
  <rect x="470" y="360" width="170" height="90" fill="#fee08b"/>
  <text x="555" y="402" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">10/25</text>
  <text x="555" y="423" text-anchor="middle" font-size="15" fill="#333">(40 %)</text>

  <!-- XVLA C4=16%  → red (muted) -->
  <rect x="640" y="360" width="170" height="90" fill="#e8614a" opacity="0.75"/>
  <rect x="640" y="360" width="170" height="90" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="725" y="402" text-anchor="middle" font-size="17" font-weight="bold" fill="white">4/25</text>
  <text x="725" y="423" text-anchor="middle" font-size="15" fill="white">(16 %)</text>

  <!-- ═══ OUTER BORDER ═══ -->
  <rect x="130" y="90" width="680" height="360" fill="none" stroke="#444" stroke-width="1.5"/>
  <!-- inner grid lines horizontal -->
  <line x1="130" y1="180" x2="810" y2="180" stroke="#fff" stroke-width="1.5"/>
  <line x1="130" y1="270" x2="810" y2="270" stroke="#fff" stroke-width="1.5"/>
  <line x1="130" y1="360" x2="810" y2="360" stroke="#fff" stroke-width="1.5"/>
  <!-- inner grid lines vertical -->
  <line x1="300" y1="90" x2="300" y2="450" stroke="#fff" stroke-width="1.5"/>
  <line x1="470" y1="90" x2="470" y2="450" stroke="#fff" stroke-width="1.5"/>
  <line x1="640" y1="90" x2="640" y2="450" stroke="#fff" stroke-width="1.5"/>

  <!-- ═══════════════════════════════
       COLORBAR (right side)
       x=840, y=90, w=28, h=360
  ═══════════════════════════════ -->
  <defs>
    <linearGradient id="cbGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#d7191c"/>
      <stop offset="25%"  stop-color="#f46d43"/>
      <stop offset="50%"  stop-color="#fee08b"/>
      <stop offset="75%"  stop-color="#a6d96a"/>
      <stop offset="100%" stop-color="#1a9641"/>
    </linearGradient>
  </defs>
  <rect x="846" y="90" width="28" height="360" fill="url(#cbGrad)" stroke="#aaa" stroke-width="1"/>

  <!-- colorbar ticks -->
  <line x1="874" y1="90"  x2="882" y2="90"  stroke="#444" stroke-width="1.2"/>
  <line x1="874" y1="180" x2="882" y2="180" stroke="#444" stroke-width="1.2"/>
  <line x1="874" y1="270" x2="882" y2="270" stroke="#444" stroke-width="1.2"/>
  <line x1="874" y1="360" x2="882" y2="360" stroke="#444" stroke-width="1.2"/>
  <line x1="874" y1="450" x2="882" y2="450" stroke="#444" stroke-width="1.2"/>

  <!-- colorbar labels -->
  <text x="886" y="94"  font-size="13" fill="#333">100 %</text>
  <text x="886" y="184" font-size="13" fill="#333">75 %</text>
  <text x="886" y="274" font-size="13" fill="#333">50 %</text>
  <text x="886" y="364" font-size="13" fill="#333">25 %</text>
  <text x="886" y="454" font-size="13" fill="#333">0 %</text>

  <!-- colorbar title (rotated) -->
  <text x="970" y="270" text-anchor="middle" font-size="13" fill="#444" transform="rotate(90,970,270)">Success rate (%)</text>

  <!-- ═══ FOOTER NOTE ═══ -->
  <text x="130" y="490" font-size="12" fill="#888" font-style="italic">* C4 is ambiguous (inactivity scored as success when matching demonstrated behavior); interpret separately from C1–C3.</text>

</svg>
